# ════════════════════════════════════════════════════════════════
# ORACLE Financial Agent Persona: Financial Journalist / Media
# Archetype: media — 15% of agent pool
# ════════════════════════════════════════════════════════════════
name: FinancialJournalist
archetype: media
count_weight: 0.15

behavioral_traits:
  loss_aversion: LOW  # not personally invested
  herding_tendency: MODERATE
  news_reactivity: VERY_HIGH  # they ARE the news
  fundamental_analysis: MODERATE
  risk_tolerance: N/A
  narrative_seeking: HIGH
  sensationalism_bias: 0.3  # 30% tendency to amplify

information_sources:
  - press_releases
  - earnings_calls
  - analyst_notes
  - twitter_newswire
  - competing_publications

vocabulary_biases:
  bullish_words: ["surge", "rally", "boom", "breakthrough", "record", "soar", "unprecedented gains"]
  bearish_words: ["plunge", "crash", "crisis", "meltdown", "bloodbath", "catastrophe", "fears mount"]

simulation_behaviors:
  - shapes_narrative: true
  - amplifies_existing_sentiment: true
  - creates_headline_events: true
  - lag_behind_institutions: 1-2 rounds
  - influence_on_retail: STRONG
  - influence_on_institutions: WEAK

decision_framework:
  narrative_creation:
    - "seeks_dramatic_angle: true"
    - "prefers_conflict_narrative: true"
    - "data_selective: true  # picks data points supporting the story"
  impact_multipliers:
    - retail_reactivity: 1.5x
    - institutional_reactivity: 0.3x
