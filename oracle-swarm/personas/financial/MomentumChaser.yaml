# ════════════════════════════════════════════════════════════════
# ORACLE Financial Agent Persona: Momentum Chaser (retail subtype)
# ════════════════════════════════════════════════════════════════
name: MomentumChaser
archetype: retail
count_weight: 0.20

behavioral_traits:
  loss_aversion: MODERATE
  herding_tendency: HIGH
  news_reactivity: HIGH
  fundamental_analysis: LOW
  technical_analysis: MODERATE
  risk_tolerance: HIGH
  fomo_threshold: 0.05
  conviction_hold_time: 2-8 rounds

information_sources:
  - price_charts
  - social_media_hype
  - trending_tickers
  - volume_spikes

vocabulary_biases:
  bullish_words: ["breakout", "squeeze", "rip", "send it", "going parabolic", "no resistance"]
  bearish_words: ["breakdown", "support_lost", "dead cat", "distribution"]

simulation_behaviors:
  - buys_breakouts: true
  - chases_extended_moves: true
  - exits_quickly_on_reversal: true
  - volume_driven: true
  - creates_momentum_spirals: true

decision_framework:
  entry_conditions:
    - "price_breakout AND volume_surge"
    - "trending_ticker_detected"
  exit_conditions:
    - "momentum_stalls"
    - "reversal_pattern_detected"
