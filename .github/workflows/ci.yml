# ════════════════════════════════════════════════════════════════
# ORACLE — CI/CD Pipeline (§21)
# Jobs: typecheck → python tests → RLS tests → deploy frontend + API
# ════════════════════════════════════════════════════════════════
name: ORACLE CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ── 0. Security Scan ──
  security-scan:
    name: Security Scan (no key leaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check_no_service_key.sh

  # ── 1. Type Safety ──
  typecheck:
    name: TypeScript Type Check
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @oracle/web typecheck

  # ── 2. Frontend Build ──
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @oracle/web build

  # ── 3. Python Tests ──
  api-tests:
    name: Python API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        working-directory: apps/api
        env:
          OPENAI_API_KEY: '' # no real key in CI
          SECRET_KEY: ci-test-secret
        run: python -m pytest tests/ -v

  # ── 4. Deploy Frontend to Vercel ──
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: [typecheck, build-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web

  # ── 5. Deploy API to Railway ──
  deploy-api:
    name: Deploy API (Railway)
    needs: [api-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bervProject/railway-deploy@v3
        with:
          service: oracle-api
          token: ${{ secrets.RAILWAY_TOKEN }}
          project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
