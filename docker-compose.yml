# ════════════════════════════════════════════════════════════════
# ORACLE — Docker Compose for Local Development
# Runs Supabase local stack + FastAPI + Vite together.
# Usage: docker compose up
# ════════════════════════════════════════════════════════════════
version: '3.8'

services:
  # ── Supabase local (Postgres + PostgREST + Realtime) ──
  # In production this is the hosted Supabase Frankfurt project.
  # For local dev, use `supabase start` CLI instead of this simplified setup.
  db:
    image: supabase/postgres:15.6.1
    ports:
      - '54322:5432'
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ──
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - .env.local
    environment:
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Vite Frontend ──
  web:
    image: node:20-slim
    working_dir: /app
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --host 0.0.0.0"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
